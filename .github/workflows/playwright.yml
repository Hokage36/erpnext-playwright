name: ERPNext Playwright CI/CD

on:
  workflow_dispatch:
    inputs:
      spec_file:
        description: Playwright spec file path, leave empty to run the full suite
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: erpnext-playwright-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: https://erpnext.sangttx.xyz

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: erpnext-production
      url: https://erpnext.sangttx.xyz
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Validate ERP credentials
        shell: bash
        env:
          ERP_USERNAME: ${{ secrets.ERP_USERNAME }}
          ERP_PASSWORD: ${{ secrets.ERP_PASSWORD }}
        run: |
          test -n "$ERP_USERNAME" || { echo "Missing ERP_USERNAME secret"; exit 1; }
          test -n "$ERP_PASSWORD" || { echo "Missing ERP_PASSWORD secret"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright suite
        shell: bash
        env:
          ERP_USERNAME: ${{ secrets.ERP_USERNAME }}
          ERP_PASSWORD: ${{ secrets.ERP_PASSWORD }}
          SPEC_FILE: ${{ github.event.inputs.spec_file }}
        run: |
          if [ -n "$SPEC_FILE" ]; then
            npx playwright test "$SPEC_FILE"
          else
            npm run test:e2e
          fi

      - name: Upload Playwright report artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload raw test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 14

  deploy-report:
    name: Deploy Playwright report
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() && needs.test.result != 'cancelled' && github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download Playwright report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: playwright-report

      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
